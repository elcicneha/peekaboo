<!DOCTYPE html>
<!--
  tokenizer.html — shell page loaded by WebViewTokenizer (SourceCodeRenderer.swift)

  This page has no visible content. Its sole purpose is to provide a
  browser context in which tokenizer.bundle.js can initialize the
  vscode-textmate WASM engine and expose window.tokenize().

  Swift calls window.tokenize(grammarJSON, code) via callAsyncJavaScript
  after the page's load event fires (didFinish navigation).

  tokenizer.bundle.js is built from tokenizer/src/tokenizer.js via:
    cd tokenizer && npm install && npm run build
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!--
    Content-Security-Policy: allow only local scripts, block everything else.
    'wasm-unsafe-eval' is required for WebAssembly instantiation on Safari.
  -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self' 'wasm-unsafe-eval'; connect-src 'none';">
  <script src="tokenizer.bundle.js"></script>
</head>
<body>
</body>
</html>
